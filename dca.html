<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DCA Portfolio — Stock Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --bg-card:    #161b27;
      --bg-dark:    #0a0d14;
      --border:     #1e2535;
      --border-mid: #253045;
      --text:       #e2e8f0;
      --muted:      #64748b;
      --dim:        #475569;
      --blue:       #60a5fa;
      --green:      #34d399;
      --red:        #f87171;
      --orange:     #fb923c;
      --header-h:   54px;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      height: var(--header-h);
      padding: 0 16px 0 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    #updated { font-size: .73rem; color: var(--muted); }
    .nav-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 10px;
      border-radius: 8px;
      font-size: .78rem;
      text-decoration: none;
      white-space: nowrap;
    }
    .nav-link:hover { border-color: var(--border-mid); color: var(--blue); }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .state-msg {
      color: var(--dim);
      font-size: .84rem;
      text-align: center;
      padding: 60px 20px;
    }

    /* ─── HERO ───────────────────────────────────── */
    .hero {
      text-align: center;
      padding: 20px 0 28px;
    }
    .hero-pl {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    .hero-pl.up   { color: var(--green); }
    .hero-pl.down { color: var(--red); }
    .hero-label {
      font-size: .74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 6px;
    }
    .hero-badge {
      display: inline-block;
      margin-top: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: .78rem;
      color: var(--blue);
    }

    /* ─── METRIC CARDS ───────────────────────────── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }
    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .metric-value { font-size: 1.15rem; font-weight: 700; }
    .metric-value.up   { color: var(--green); }
    .metric-value.down { color: var(--red); }
    .metric-label {
      font-size: .68rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-top: 4px;
    }

    /* ─── REBALANCE ALERT ────────────────────────── */
    .rebalance-banner {
      background: #241505;
      border: 1px solid #7c4a12;
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 28px;
      font-size: .82rem;
      color: #fdba74;
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    /* ─── SECTION ─────────────────────────────────── */
    .section { margin-bottom: 28px; }
    .section-title {
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

    /* ─── HOLDINGS LIST ───────────────────────────── */
    .holding-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }
    .holding-row:last-child { border-bottom: none; }
    .holding-ticker { font-weight: 600; white-space: nowrap; }
    .holding-market {
      font-size: .68rem;
      color: var(--dim);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
    }
    .holding-leader { flex: 1; border-bottom: 1px dotted var(--border-mid); height: 0; margin-bottom: 5px; }
    .holding-pct { font-weight: 700; white-space: nowrap; }

    /* ─── ALLOCATION BAR ──────────────────────────── */
    .alloc-bar {
      display: flex;
      height: 20px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .alloc-seg.core      { background: var(--blue); }
    .alloc-seg.satellite { background: var(--orange); }
    .alloc-legend { display: flex; gap: 18px; font-size: .78rem; color: var(--muted); }
    .alloc-legend-item { display: flex; align-items: center; gap: 6px; }
    .alloc-dot { width: 9px; height: 9px; border-radius: 50%; }
    .alloc-dot.core      { background: var(--blue); }
    .alloc-dot.satellite { background: var(--orange); }

    @media (max-width: 480px) {
      .hero-pl { font-size: 2.2rem; }
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>📊 DCA Portfolio</h1>
    <div class="header-right">
      <a class="nav-link" href="./index.html">← Watchlist</a>
      <span id="updated"></span>
    </div>
  </header>

  <main id="app">
    <div class="state-msg" id="state-msg">กำลังโหลดข้อมูล…</div>
  </main>

  <script src="./dca.js"></script>
</body>
</html>
