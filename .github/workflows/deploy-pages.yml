name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  schedule:
    - cron: '30 1 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate stocks.json from briefs/
        run: python scripts/gen_stocks_json.py

      - name: Inject Finnhub key into config.js
        run: |
          echo "window.FINNHUB_KEY = \"${{ secrets.FINNHUB_KEY }}\";" > webapp/config.js

      - name: Copy briefs into webapp
        run: |
          mkdir -p webapp/briefs
          cp briefs/*.md webapp/briefs/ 2>/dev/null || true

      - name: Deploy webapp/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webapp
          publish_branch: gh-pages
          force_orphan: true
