name: Daily Stock News Alert

on:
  schedule:
    - cron: '10 13 * * 1-6'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news alert
        run: python scripts/news_alert.py
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          TG_TOKEN:    ${{ secrets.TG_TOKEN }}
          TG_CHAT:     ${{ secrets.TG_CHAT }}

      - name: Commit alert JSON if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add webapp/bear_alerts.json webapp/bull_alerts.json
          git diff --cached --quiet || git commit -m "chore: update bull/bear alerts"
          git push
